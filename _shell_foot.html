  </main>
  </div>
</div>

<script>
// Load sidebar JS with depth-aware path
(function(){
  var depth = /\/(days|monthly)\//.test(location.pathname) ? '../' : './';
  var s = document.createElement('script');
  s.src = depth + '_sidebar.js';
  s.defer = true;
  document.body.appendChild(s);
})();
</script>
<script>
// Build TOC from h2/h3 inside main
(function() {
  const tocList = document.getElementById('tocList');
  const main = document.querySelector('.main');
  const headings = main.querySelectorAll('section.level2 > h2, section.level3 > h3');
  let currentH2Item = null;
  let currentH2SubList = null;

  headings.forEach(h => {
    const parent = h.parentElement;
    const id = parent.id;
    if (!id) return;
    let text = h.textContent.trim();
    const isH2 = h.tagName === 'H2';

    const link = document.createElement('a');
    link.href = '#' + id;
    link.textContent = text;
    link.dataset.target = id;

    const li = document.createElement('li');
    li.appendChild(link);

    if (isH2) {
      tocList.appendChild(li);
      currentH2Item = li;
      currentH2SubList = null; // lazy-create only if H3 follows
    } else if (currentH2Item) {
      if (!currentH2SubList) {
        currentH2SubList = document.createElement('ul');
        currentH2Item.appendChild(currentH2SubList);
      }
      currentH2SubList.appendChild(li);
    }
  });
})();

// Reading progress
(function() {
  const bar = document.getElementById('progressBar');
  function update() {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    bar.style.width = Math.min(100, progress) + '%';
  }
  window.addEventListener('scroll', update, { passive: true });
  window.addEventListener('resize', update);
  update();
})();

// Active section highlighting
(function() {
  const tocLinks = document.querySelectorAll('#tocList a');
  const linkMap = {};
  tocLinks.forEach(a => { linkMap[a.dataset.target] = a; });

  // Map link → its parent h2 LI (so we can expand the right group)
  const parentH2LiMap = {};
  document.querySelectorAll('#tocList > li').forEach(h2Li => {
    const h2Link = h2Li.querySelector(':scope > a');
    if (!h2Link) return;
    parentH2LiMap[h2Link.dataset.target] = h2Li;
    h2Li.querySelectorAll(':scope > ul a').forEach(subA => {
      parentH2LiMap[subA.dataset.target] = h2Li;
    });
  });

  const sections = document.querySelectorAll('.main section.level2, .main section.level3');
  if (!sections.length) return;

  function clearActive() {
    document.querySelectorAll('#tocList a.active').forEach(a => a.classList.remove('active'));
    document.querySelectorAll('#tocList > li.active').forEach(li => li.classList.remove('active'));
  }

  const observer = new IntersectionObserver((entries) => {
    // Pick the topmost intersecting entry
    let topEntry = null;
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        if (!topEntry || entry.boundingClientRect.top < topEntry.boundingClientRect.top) {
          topEntry = entry;
        }
      }
    });
    if (!topEntry) return;
    const id = topEntry.target.id;
    if (!linkMap[id]) return;

    clearActive();
    linkMap[id].classList.add('active');
    const parentH2 = parentH2LiMap[id];
    if (parentH2) {
      parentH2.classList.add('active');
      // Also mark the H2 link active if a child is active
      const h2Link = parentH2.querySelector(':scope > a');
      if (h2Link && h2Link.dataset.target !== id) {
        // Keep H2 visually de-emphasized while child is active — just expand
      }
    }
  }, {
    rootMargin: '-80px 0px -65% 0px',
    threshold: 0
  });

  sections.forEach(s => { if (s.id) observer.observe(s); });
})();

// Smooth TOC click
document.querySelectorAll('#tocList a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    const id = a.dataset.target;
    const target = document.getElementById(id);
    if (target) {
      const top = target.getBoundingClientRect().top + window.scrollY - 68;
      window.scrollTo({ top, behavior: 'smooth' });
      history.replaceState(null, '', '#' + id);
    }
  });
});

// Mobile TOC sheet open/close
(function() {
  const trigger = document.getElementById('mobileTocTrigger');
  const scrim = document.getElementById('mobileTocScrim');
  const sheet = document.querySelector('.sidebar');
  if (!trigger || !sheet || !scrim) return;

  function openSheet() {
    sheet.classList.add('open');
    scrim.classList.add('open');
    trigger.classList.add('hidden');
    document.body.style.overflow = 'hidden';
  }
  function closeSheet() {
    sheet.classList.remove('open');
    scrim.classList.remove('open');
    trigger.classList.remove('hidden');
    document.body.style.overflow = '';
  }

  trigger.addEventListener('click', openSheet);
  scrim.addEventListener('click', closeSheet);

  // Close on TOC link click (after scroll kicks off)
  document.querySelectorAll('#tocList a').forEach(a => {
    a.addEventListener('click', () => {
      if (sheet.classList.contains('open')) {
        setTimeout(closeSheet, 240);
      }
    });
  });

  // Escape closes
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && sheet.classList.contains('open')) closeSheet();
  });
})();
</script>

</body>
</html>
