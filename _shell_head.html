<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HuPa Physical AI Daily — Signal Digest</title>
<meta name="description" content="HuPa daily intelligence digest on Physical AI: data, annotation, embedded systems, robotics, humanoids. Signal only.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1A2D5C;        /* deep indigo - primary */
  --ink-2: #4A4438;      /* warm body text */
  --mute: #7A7466;       /* warm muted */
  --mute-2: #9A958C;     /* lighter muted */
  --paper: #F8F3E9;      /* warm cream background */
  --paper-2: #F0EBDF;    /* warmer card */
  --paper-3: #EAE2D0;    /* slightly stronger */
  --hair: rgba(26, 45, 92, 0.12);
  --hair-strong: rgba(26, 45, 92, 0.22);
  --amber: #F4A300;      /* HuPa saffron */
  --amber-soft: rgba(244, 163, 0, 0.12);
  --amber-strong: rgba(244, 163, 0, 0.22);
  --green: #0F5132;
  --red: #B7402A;

  --sidebar-w: 232px;
  --header-h: 56px;
  --content-w: 820px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html {
  scroll-behavior: smooth;
  scroll-padding-top: 80px;
  background: var(--paper);
}

body {
  background: var(--paper);
  color: var(--ink-2);
  font-family: 'Geist', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 16.5px;
  line-height: 1.7;
  font-feature-settings: "kern" 1, "liga" 1, "ss01" 1;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

::selection {
  background: var(--ink);
  color: var(--paper);
}

/* Progress bar */
.progress {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: transparent;
  z-index: 200;
}
.progress-bar {
  height: 100%;
  background: var(--amber);
  width: 0;
  transition: width 0.08s linear;
}

/* Header */
.header {
  position: fixed;
  top: 0;
  left: var(--sidebar-w);
  right: 0;
  height: var(--header-h);
  background: rgba(248, 243, 233, 0.94);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--hair);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 36px;
}
.header-meta {
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--mute);
}
.header-meta b {
  color: var(--ink);
  font-weight: 600;
}
.header-meta i {
  color: var(--amber);
  font-style: normal;
  padding: 0 4px;
}
.pdf-btn {
  background: var(--ink);
  color: var(--paper);
  border: none;
  padding: 9px 16px;
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border-radius: 0;
}
.pdf-btn:hover {
  background: var(--amber);
  color: var(--ink);
}
.pdf-btn svg {
  width: 13px; height: 13px;
  stroke-width: 1.6;
}

/* Layout */
.layout {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 100vh;
}

/* Sidebar */
.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  padding: 28px 22px 28px 28px;
  border-right: 1px solid var(--hair);
  overflow-y: auto;
  background: var(--paper);
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--hair-strong); border-radius: 2px; }

.brand-mark {
  font-family: 'Geist', sans-serif;
  font-weight: 700;
  font-size: 22px;
  letter-spacing: 0.18em;
  color: var(--ink);
  margin-bottom: 6px;
}
.brand-mark span {
  color: var(--amber);
  padding: 0 2px;
}
.brand-sub {
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--mute);
  margin-bottom: 36px;
}

/* Site nav (rendered from manifest.json by _sidebar.js) */
.sitenav { margin-bottom: 24px; }
.sitenav-block { margin-bottom: 16px; }
.sitenav-label {
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--mute);
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--hair);
}
.sitenav-label .count {
  font-weight: 500;
  color: var(--mute-2);
  margin-left: 4px;
}
.sitenav-list {
  list-style: none;
  padding: 0;
  margin: 0;
  font-size: 13px;
  line-height: 1.45;
}
.sitenav-list > li { margin-bottom: 3px; }
.sitenav-list a {
  display: block;
  color: var(--ink-2);
  text-decoration: none;
  padding: 4px 8px;
  border-left: 2px solid transparent;
  transition: all 0.12s ease;
}
.sitenav-list a:hover { background: var(--paper-2); color: var(--ink); }
.sitenav-list a.active {
  background: var(--amber-soft);
  color: var(--ink);
  border-left-color: var(--amber);
  font-weight: 500;
}
.sitenav-list .count {
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-size: 10px;
  color: var(--mute-2);
  margin-left: 4px;
}
.sitenav-list details { margin: 0; }
.sitenav-list summary {
  cursor: pointer;
  padding: 4px 8px;
  font-size: 12.5px;
  color: var(--ink);
  font-weight: 500;
  list-style: none;
  user-select: none;
  border-left: 2px solid transparent;
}
.sitenav-list summary::-webkit-details-marker { display: none; }
.sitenav-list summary::before {
  content: '▸';
  color: var(--mute-2);
  font-size: 9px;
  margin-right: 6px;
  transition: transform 0.12s ease;
  display: inline-block;
}
.sitenav-list details[open] > summary::before { transform: rotate(90deg); }
.sitenav-list summary:hover { background: var(--paper-2); }
.sitenav-list ul.sub {
  list-style: none;
  padding: 2px 0 4px 14px;
  margin: 0;
  border-left: 1px solid var(--hair);
  margin-left: 12px;
}
.sitenav-list ul.sub a { font-size: 12.5px; padding: 3px 8px; }
.day-item .day-date {
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-size: 11.5px;
}
.sitenav-list li.muted span {
  display: block;
  padding: 4px 8px;
  color: var(--mute);
  font-size: 12.5px;
}
.sitenav-list li.muted small { color: var(--mute-2); font-size: 10.5px; }

#sitenavSearch {
  width: 100%;
  font-family: 'Geist', sans-serif;
  font-size: 12.5px;
  padding: 6px 8px;
  background: var(--paper);
  color: var(--ink);
  border: 1px solid var(--hair-strong);
  border-radius: 0;
  outline: none;
}
#sitenavSearch:focus { border-color: var(--ink); }
.search-results { margin-top: 8px; max-height: 280px; overflow-y: auto; }
.search-hit {
  display: block;
  padding: 6px 8px;
  margin-bottom: 4px;
  text-decoration: none;
  color: var(--ink-2);
  border-left: 2px solid var(--hair);
  background: var(--paper-2);
  transition: all 0.1s ease;
}
.search-hit:hover { border-left-color: var(--amber); background: var(--paper-3); }
.search-hit .hit-date {
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-size: 10.5px;
  color: var(--mute);
  margin-bottom: 2px;
}
.search-hit .hit-snippet { font-size: 12px; line-height: 1.35; color: var(--ink-2); }
.search-empty { padding: 6px 8px; color: var(--mute); font-size: 12px; }
.sitenav-error { padding: 8px; color: var(--red); font-size: 12px; }

.toc-label {
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--mute);
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--hair);
}

.toc nav ul {
  list-style: none;
  margin: 0; padding: 0;
}
.toc > nav > ul > li {
  margin-bottom: 1px;
}

.toc a {
  display: block;
  font-family: 'Geist', sans-serif;
  font-size: 13.5px;
  font-weight: 400;
  color: var(--ink-2);
  text-decoration: none;
  padding: 6px 8px 6px 10px;
  border-left: 2px solid transparent;
  border-bottom: none;
  transition: all 0.12s ease;
  line-height: 1.35;
}
.toc a:hover {
  color: var(--ink);
  background: var(--paper-2);
}
.toc a.active {
  color: var(--ink);
  border-left-color: var(--amber);
  background: var(--amber-soft);
  font-weight: 500;
}

/* Sub-list — collapsed by default, expand only under active parent */
.toc > nav > ul > li > ul {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.28s ease, margin 0.28s ease;
  margin: 0;
  padding-left: 14px;
  border-left: 1px solid var(--hair);
  margin-left: 6px;
}
.toc > nav > ul > li.active > ul,
.toc > nav > ul > li:hover > ul {
  max-height: 800px;
  margin-top: 2px;
  margin-bottom: 8px;
}
.toc ul ul a {
  font-size: 12px;
  color: var(--mute);
  padding: 4px 8px 4px 10px;
  font-weight: 400;
}
.toc ul ul a:hover {
  color: var(--ink-2);
  background: transparent;
}
.toc ul ul a.active {
  color: var(--ink);
  background: transparent;
  border-left-color: var(--amber);
  font-weight: 500;
}

/* Main */
.main-wrap {
  padding-top: var(--header-h);
}
.main {
  max-width: var(--content-w);
  margin: 0 auto;
  padding: 56px 40px 120px;
}

/* Typography */
h1 {
  font-family: 'Geist', sans-serif;
  font-weight: 700;
  font-size: 48px;
  line-height: 1.05;
  letter-spacing: -0.025em;
  color: var(--ink);
  margin: 0 0 24px;
}
h1 + p {
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-size: 11.5px;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--mute);
  line-height: 1.9;
  margin-bottom: 8px;
}
h1 + p strong {
  color: var(--ink);
  font-weight: 600;
}

h2 {
  font-family: 'Geist', sans-serif;
  font-weight: 700;
  font-size: 30px;
  line-height: 1.15;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin: 72px 0 24px;
  padding-top: 36px;
  border-top: 1px solid var(--hair);
  scroll-margin-top: 80px;
}

h3 {
  font-family: 'Geist', sans-serif;
  font-weight: 600;
  font-size: 20px;
  line-height: 1.3;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin: 44px 0 14px;
  scroll-margin-top: 80px;
}

h4 {
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-weight: 600;
  font-size: 11px;
  line-height: 1.5;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--amber);
  margin: 28px 0 10px;
}

p {
  margin-bottom: 18px;
  color: var(--ink-2);
}

p > strong:first-child {
  color: var(--ink);
  font-family: 'Geist', sans-serif;
  font-weight: 700;
  letter-spacing: -0.005em;
}

strong {
  color: var(--ink);
  font-weight: 600;
}

em {
  font-family: 'Instrument Serif', Georgia, serif;
  font-style: italic;
  font-weight: 400;
  color: var(--ink);
  font-size: 1.08em;
}

a {
  color: var(--ink);
  text-decoration: none;
  border-bottom: 1px solid var(--amber);
  transition: all 0.12s;
  padding-bottom: 1px;
}
a:hover {
  color: var(--amber);
}

/* Lists */
ul, ol {
  padding-left: 24px;
  margin: 0 0 22px;
}
ul li, ol li {
  margin-bottom: 8px;
  line-height: 1.65;
  color: var(--ink-2);
}
ul li::marker {
  color: var(--amber);
}
ol li::marker {
  color: var(--amber);
  font-family: 'Geist Mono', monospace;
  font-weight: 500;
}

/* Tables */
table {
  width: 100%;
  border-collapse: collapse;
  margin: 28px 0 32px;
  font-family: 'Geist', sans-serif;
  font-size: 13.5px;
  line-height: 1.5;
  background: var(--paper);
  border: 1px solid var(--hair-strong);
}
thead {
  background: var(--paper-2);
  border-bottom: 1.5px solid var(--ink);
}
th {
  text-align: left;
  padding: 11px 13px;
  color: var(--ink);
  font-family: 'Geist Mono', monospace;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 10.5px;
  vertical-align: bottom;
}
td {
  padding: 11px 13px;
  border-bottom: 1px solid var(--hair);
  vertical-align: top;
  color: var(--ink-2);
}
td strong { color: var(--ink); }
td a {
  border-bottom-color: var(--amber);
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--paper-2); }

/* Code */
code {
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-size: 0.88em;
  background: var(--paper-2);
  padding: 1px 6px;
  border: 1px solid var(--hair);
  color: var(--ink);
}
pre {
  background: var(--paper-2);
  border: 1px solid var(--hair);
  border-left: 3px solid var(--amber);
  padding: 18px 22px;
  overflow-x: auto;
  margin: 24px 0;
  font-size: 12px;
  line-height: 1.7;
  font-family: 'Geist Mono', ui-monospace, monospace;
}
pre code {
  background: none;
  border: none;
  padding: 0;
  color: var(--ink-2);
  font-size: inherit;
}

/* Blockquote */
blockquote {
  border-left: 3px solid var(--amber);
  padding: 4px 0 4px 18px;
  margin: 22px 0;
  color: var(--mute);
}
blockquote em {
  color: var(--ink-2);
}

/* HR — restrained */
hr {
  border: none;
  border-top: 1px solid var(--hair);
  margin: 44px 0;
  position: relative;
}
hr::before {
  content: '✦';
  position: absolute;
  left: 50%;
  top: -10px;
  transform: translateX(-50%);
  background: var(--paper);
  color: var(--mute-2);
  font-size: 12px;
  padding: 0 12px;
}

/* Tighter spacing for first section */
section.level1 > h1 {
  margin-top: 0;
  padding-top: 0;
  border-top: none;
}
section.level2:first-of-type > h2 {
  margin-top: 28px;
  padding-top: 0;
  border-top: none;
}
section.level2 > section.level3:first-of-type > h3 {
  margin-top: 24px;
}

/* Mobile-only elements hidden on desktop */
.mobile-toc-trigger,
.mobile-toc-scrim,
.sidebar-actions { display: none; }

/* Responsive — tablet down */
@media (max-width: 980px) {
  /* Hide the desktop top bar entirely on mobile — let the content breathe */
  .header { display: none; }
  .main-wrap { padding-top: 0; }
  .layout { grid-template-columns: 1fr; }

  body { font-size: 17px; line-height: 1.7; -webkit-text-size-adjust: 100%; }
  .main { padding: 36px 22px 110px; max-width: 100%; }

  h1 { font-size: 36px; line-height: 1.08; }
  h1 + p { font-size: 11px; line-height: 1.8; margin-bottom: 6px; }
  h2 { font-size: 26px; margin-top: 56px; padding-top: 28px; }
  h3 { font-size: 19px; margin-top: 40px; }

  /* Sidebar morphs into bottom sheet */
  .sidebar {
    position: fixed;
    top: auto;
    bottom: 0;
    left: 0;
    right: 0;
    height: auto;
    max-height: 82vh;
    border-right: none;
    border-top: 2px solid var(--ink);
    box-shadow: 0 -12px 44px rgba(26, 45, 92, 0.28);
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 10px 22px 32px;
    z-index: 200;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .sidebar.open { transform: translateY(0); }
  .sidebar::before {
    content: '';
    display: block;
    width: 44px;
    height: 4px;
    background: var(--hair-strong);
    border-radius: 2px;
    margin: 0 auto 14px;
  }
  .brand-mark { font-size: 18px; margin-bottom: 2px; }
  .brand-sub { margin-bottom: 16px; font-size: 9.5px; }

  /* PDF action shows inside the bottom sheet on mobile */
  .sidebar-actions {
    display: flex;
    margin: 0 0 18px;
    padding: 0 0 16px;
    border-bottom: 1px solid var(--hair);
  }
  .sidebar-actions .pdf-btn {
    display: inline-flex;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 12px 18px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    border-radius: 0;
  }
  .sidebar-actions .pdf-btn svg {
    width: 14px;
    height: 14px;
    stroke-width: 1.6;
  }

  /* Floating contents trigger — bottom-right pill */
  .mobile-toc-trigger {
    display: inline-flex;
    position: fixed;
    bottom: 20px;
    right: 20px;
    left: auto;
    transform: none;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 13px 20px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    z-index: 150;
    box-shadow: 0 10px 32px rgba(26, 45, 92, 0.38), 0 2px 8px rgba(26, 45, 92, 0.18);
    align-items: center;
    gap: 8px;
    border-radius: 100px;
    transition: opacity 0.2s ease, transform 0.2s ease, background 0.15s ease, color 0.15s ease;
  }
  .mobile-toc-trigger:active {
    background: var(--amber);
    color: var(--ink);
  }
  .mobile-toc-trigger svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    stroke-width: 1.6;
  }
  .mobile-toc-trigger.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(12px);
  }

  /* Scrim */
  .mobile-toc-scrim {
    display: block;
    position: fixed;
    inset: 0;
    background: rgba(26, 45, 92, 0.48);
    opacity: 0;
    pointer-events: none;
    z-index: 180;
    transition: opacity 0.32s ease;
  }
  .mobile-toc-scrim.open {
    opacity: 1;
    pointer-events: auto;
  }

  /* Horizontally-scrollable tables on small screens */
  .main table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    font-size: 13.5px;
  }
  .main table tbody td,
  .main table thead th {
    min-width: 130px;
    padding: 11px 12px;
  }

  /* Code blocks can scroll */
  pre { font-size: 12px; padding: 14px 18px; }
}

@media (max-width: 540px) {
  body { font-size: 16.5px; line-height: 1.68; }
  h1 { font-size: 30px; line-height: 1.1; }
  h1 + p { font-size: 10.5px; line-height: 1.7; }
  h2 { font-size: 23px; margin-top: 46px; padding-top: 22px; }
  h3 { font-size: 18px; margin-top: 34px; }
  h4 { font-size: 10px; }
  .main { padding: 28px 18px 110px; }
  .main table { font-size: 12.5px; }
  .main th, .main td { padding: 9px 10px; }
  .main pre { font-size: 11.5px; padding: 12px 14px; }
  ul, ol { padding-left: 22px; }

  .mobile-toc-trigger {
    padding: 11px 16px;
    font-size: 10.5px;
    bottom: 16px;
    right: 16px;
  }
  .mobile-toc-trigger svg { width: 13px; height: 13px; }
}

/* Print → PDF */
@media print {
  @page {
    size: A4;
    margin: 18mm 16mm 18mm 16mm;
  }
  html { scroll-behavior: auto; }
  body {
    background: #FFFFFF;
    color: #1A2D5C;
    font-family: 'Geist', sans-serif;
    font-size: 10.5pt;
    line-height: 1.5;
  }
  ::selection { background: transparent; }
  .progress, .header, .sidebar { display: none !important; }
  .layout { display: block; }
  .main-wrap { padding-top: 0; }
  .main {
    max-width: 100%;
    padding: 0;
    margin: 0;
  }
  h1 {
    font-size: 24pt;
    color: #1A2D5C;
    margin: 0 0 12pt;
    page-break-after: avoid;
  }
  h1 + p {
    font-size: 8pt;
    color: #7A7466;
